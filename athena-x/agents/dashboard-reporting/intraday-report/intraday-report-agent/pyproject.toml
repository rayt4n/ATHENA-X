[project]
name = "athena_x_agent_dashboard_reporting_intraday_report_intraday_report_agent"
version = "0.1.0"
description = "Intraday Report Agent — dashboard-reporting agent"
requires-python = ">=3.11"
dependencies = [
    "athena-x-runtime-event-bus",
    "athena-x-runtime-logger",
    "athena-x-runtime-health-monitor",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/athena_x_agent_dashboard_reporting_intraday_report_intraday_report_agent"]
