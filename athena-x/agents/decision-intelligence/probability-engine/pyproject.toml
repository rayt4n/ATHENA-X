[project]
name = "athena_x_agent_decision_intelligence_probability_engine"
version = "0.1.0"
description = "Probability Engine — decision-intelligence agent for ATHENA-X"
requires-python = ">=3.11"
dependencies = [
    "athena-x-runtime-event-bus",
    "athena-x-runtime-logger",
    "athena-x-runtime-health-monitor",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/athena_x_agent_decision_intelligence_probability_engine"]
