[project]
name = "athena_x_agent_data_collection_options_data_databento_options_collector"
version = "0.1.0"
description = "Databento Options Collector — data-collection agent"
requires-python = ">=3.11"
dependencies = [
    "athena-x-runtime-event-bus",
    "athena-x-runtime-logger",
    "athena-x-runtime-health-monitor",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/athena_x_agent_data_collection_options_data_databento_options_collector"]
