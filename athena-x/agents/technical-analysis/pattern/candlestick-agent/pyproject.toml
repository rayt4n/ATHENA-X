[project]
name = "athena_x_agent_technical_analysis_pattern_candlestick_agent"
version = "0.1.0"
description = "Candlestick AI — technical-analysis agent"
requires-python = ">=3.11"
dependencies = [
    "athena-x-runtime-event-bus",
    "athena-x-runtime-logger",
    "athena-x-runtime-health-monitor",
    "athena-x-plugin-patterns-candlestick",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/athena_x_agent_technical_analysis_pattern_candlestick_agent"]
