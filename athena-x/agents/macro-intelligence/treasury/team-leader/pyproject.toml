[project]
name = "athena_x_agent_macro_intelligence_treasury_team_leader"
version = "0.1.0"
description = "Treasury Team Leader — macro-intelligence agent"
requires-python = ">=3.11"
dependencies = [
    "athena-x-runtime-event-bus",
    "athena-x-runtime-logger",
    "athena-x-runtime-health-monitor",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/athena_x_agent_macro_intelligence_treasury_team_leader"]
