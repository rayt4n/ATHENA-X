[project]
name = "athena_x_agent_options_intelligence_iv_volatility_surface_agent"
version = "0.1.0"
description = "Volatility Surface AI — options-intelligence agent"
requires-python = ">=3.11"
dependencies = [
    "athena-x-runtime-event-bus",
    "athena-x-runtime-logger",
    "athena-x-runtime-health-monitor",
    "athena-x-plugin-options-volatility-surface",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/athena_x_agent_options_intelligence_iv_volatility_surface_agent"]
