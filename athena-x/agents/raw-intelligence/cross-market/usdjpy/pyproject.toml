[project]
name = "athena_x_agent_raw_intelligence/cross_market_usdjpy"
version = "0.1.0"
description = "USDJPY Cross-Market Agent — raw-intelligence/cross-market agent for ATHENA-X"
requires-python = ">=3.11"
dependencies = [
    "athena-x-runtime-event-bus",
    "athena-x-runtime-logger",
    "athena-x-runtime-health-monitor",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/athena_x_agent_raw_intelligence/cross_market_usdjpy"]
