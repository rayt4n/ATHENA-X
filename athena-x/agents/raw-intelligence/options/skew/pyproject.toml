[project]
name = "athena_x_agent_raw_intelligence/options_skew"
version = "0.1.0"
description = "Skew AI — raw-intelligence/options agent for ATHENA-X"
requires-python = ">=3.11"
dependencies = [
    "athena-x-runtime-event-bus",
    "athena-x-runtime-logger",
    "athena-x-runtime-health-monitor",
    "athena-x-plugin-options-skew",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/athena_x_agent_raw_intelligence/options_skew"]
