[project]
name = "athena-x-runtime-plugin-validation-workspace"
version = "0.1.0"
description = "Stage 16.5 — Plugin Validation Workspace. Validates every existing plugin/agent against trading-logic scenarios, cross-validates against pandas-ta, and produces per-plugin evidence reports."
requires-python = ">=3.11"
dependencies = [
    "athena-x-runtime-logger",
    "athena-x-runtime-event-envelope",
    "athena-x-runtime-event-bus",
    "athena-x-runtime-repository-interface",
    "athena-x-runtime-in-memory-repository",
    "athena-x-ta-base",
    "athena-x-ta-layer1-market-structure",
    "athena-x-ta-layer2-indicators",
    "athena-x-ta-layer3-institutional",
    "athena-x-ta-layer4-consensus",
    "athena-x-ta-layer5-supervisor",
    "athena-x-ta-snapshot",
    "athena-x-runtime-stage7-integration",
    "athena-x-runtime-institutional-workspace",
    "numpy>=2.0.0",
    "pandas>=2.0.0",
    "pandas-ta>=0.4.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/athena_x_runtime_plugin_validation_workspace"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
