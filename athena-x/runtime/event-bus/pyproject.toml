[project]
name = "athena-x-runtime-event-bus"
version = "0.1.0"
description = "Central typed pub/sub bus for ATHENA-X"
requires-python = ">=3.11"
dependencies = [
    "redis>=5.0.0",
    "nats-py>=2.7.0",
    "pydantic>=2.9.0",
    "structlog>=24.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/athena_x_runtime_event_bus"]
