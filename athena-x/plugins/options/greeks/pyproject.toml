[project]
name = "athena-x-plugin-options-greeks"
version = "0.1.0"
description = "Greeks Calculator options plugin for ATHENA-X"
requires-python = ">=3.11"
dependencies = ["numpy>=2.0.0", "scipy>=1.14.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/athena_x_plugin_options_greeks"]
