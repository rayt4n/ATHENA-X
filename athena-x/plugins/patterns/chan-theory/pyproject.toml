[project]
name = "athena-x-plugin-patterns-chan-theory"
version = "0.1.0"
description = "Chan Theory (缠论) Analyzer pattern recognition plugin for ATHENA-X"
requires-python = ">=3.11"
dependencies = ["numpy>=2.0.0", "pandas>=2.2.0", "scipy>=1.14.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/athena_x_plugin_patterns_chan_theory"]
