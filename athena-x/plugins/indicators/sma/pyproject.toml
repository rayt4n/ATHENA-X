[project]
name = "athena-x-plugin-indicators-sma"
version = "0.1.0"
description = "Simple Moving Average indicator plugin for ATHENA-X"
requires-python = ">=3.11"
dependencies = ["numpy>=2.0.0", "pandas>=2.2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/athena_x_plugin_indicators_sma"]
