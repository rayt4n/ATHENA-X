name: CI Backend

on:
  push:
    paths: ['apps/python-backend/**', 'agents/**', 'engines/**', 'providers/**', 'runtime/**', 'plugins/**']
  pull_request:
    paths: ['apps/python-backend/**', 'agents/**', 'engines/**', 'providers/**', 'runtime/**', 'plugins/**']

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run mypy .
      - run: uv run pytest
