name: CI Plugins

on:
  push:
    paths: ['plugins/**']
  pull_request:
    paths: ['plugins/**']

jobs:
  plugins:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: [indicators, options, patterns]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - run: uv run pytest plugins/${{ matrix.plugin }}/
